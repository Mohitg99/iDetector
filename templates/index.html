<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iDetector - Smart Surveillance</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            color: white;
            height: 100vh;
        }

        .hero {
            margin-top: 20px;
        }

        .card-custom {
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            box-shadow: 0px 5px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-custom {
            border-radius: 10px;
            padding: 10px 20px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-transparent px-4">
        <span class="navbar-brand fs-4">
            <i class="bi bi-camera-video"></i> iDetector
        </span>
        <a href="/login" class="btn btn-light btn-sm">Login</a>
    </nav>

    <!-- HERO SECTION -->
    <div class="container text-center hero">
        <h1 class="display-4 fw-bold">AI-Based Mask Detection System</h1>
        <p class="lead">Real-time monitoring, analytics & automated violation tracking</p>
    </div>

    <!-- MAIN CARD -->
    <div class="container">
        <div class="row justify-content-center">

            <div class="col-md-6">
                <div class="card-custom text-center">

                    <h4 class="mb-3">Upload Image</h4>

                    <form action="/upload" method="post" enctype="multipart/form-data" class="mb-4">
                        <input type="file" name="image" class="form-control mb-3">
                        <button class="btn btn-primary btn-custom w-100">
                            <i class="bi bi-upload"></i> Upload & Detect
                        </button>
                        <p class="mt-3 text-light small">
                            ⚡ Real-time detection | 📊 Analytics Dashboard | 📁 Auto Reporting
                        </p>
                    </form>

                    <hr class="bg-light">

                    <h5 class="mb-3">Or Use Live Detection</h5>

                    <a href="/webcam" class="btn btn-warning btn-custom w-100 mb-2">
                        <i class="bi bi-camera"></i> Start Webcam
                    </a>

                    <a href="/dashboard" class="btn btn-success btn-custom w-100">
                        <i class="bi bi-bar-chart"></i> View Dashboard
                    </a>

                </div>
            </div>

        </div>
    </div>

</body>

</html>
